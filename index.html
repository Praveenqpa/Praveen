        function loadDailyQuote() {
            const today = new Date();
            const dayCounter = Math.floor(today.getTime() / (1000 * 60 * 60 * 24));
            
            const quoteIndex = dayCounter % myCustomQuotesList.length;
            const todaysQuote = myCustomQuotesList[quoteIndex];

            document.getElementById('arabic-display').innerText = todaysQuote.arabic;
            document.getElementById('tamil-display').innerText = `"${todaysQuote.tamil}"`;
            document.getElementById('reference-display').innerText = todaysQuote.reference;
        }

        // --- Smoke Simulation Engine ---
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 20 + 10;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1.2 - 0.4; 
                this.maxLife = Math.random() * 100 + 80;
                this.life = this.maxLife;
                this.opacity = Math.random() * 0.25 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.size += 0.15; 
                this.life--;
            }

            draw() {
                let currentOpacity = (this.life / this.maxLife) * this.opacity;
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(34, 197, 94, ${currentOpacity})`); 
                gradient.addColorStop(0.5, `rgba(22, 163, 74, ${currentOpacity * 0.4})`); 
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); 
                
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function getLampPositions() {
            const leftLamp = document.getElementById('left-lamp').getBoundingClientRect();
            const rightLamp = document.getElementById('right-lamp').getBoundingClientRect();
            return [
                { x: leftLamp.left + leftLamp.width / 2, y: leftLamp.top + leftLamp.height / 3 },
                { x: rightLamp.left + rightLamp.width / 2, y: rightLamp.top + rightLamp.height / 3 }
            ];
        }

        function animateSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (document.getElementById('left-lamp')) {
                const lamps = getLampPositions();
                lamps.forEach(lamp => {
                    if(Math.random() < 0.12) { 
                        particles.push(new Particle(lamp.x, lamp.y));
                    }
                });
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateSmoke);
        }

        window.onload = function() {
            loadDailyQuote();
            animateSmoke();
        };
